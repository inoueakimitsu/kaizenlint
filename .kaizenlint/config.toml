include = ["*.py", "*.md", "*.txt"]
exclude = [".git", ".venv", "__pycache__", "node_modules", ".kaizenlint"]
rules = ["rules/**/*.md"]

[executor]
type = "async"
default-concurrency = 5

[llm.endpoints.openai]
max_concurrency = 100

[llm.profiles.light]
model = "gpt-5-nano"
endpoint = "openai"

[llm.profiles.heavy]
model = "gpt-5-mini"
endpoint = "openai"

[suppression]

# =============================================================================
# README.md
# =============================================================================
# README はドキュメントであり、コード品質ルールの適用対象外です。
"README.md" = [
    { rule = "rules/python_style.md:NumPy 形式 docstring" },
    { rule = "rules/python_style.md:Import Organization" },
    { rule = "rules/readable_code/02_naming.md:ひどい名前にコメントを付けるのではなく、名前を改善する" },
    { rule = "rules/readable_code/02_naming.md:抽象的な名前よりも具体的な名前を使う" },
    { rule = "rules/readable_code/03_comments.md:設計上の判断を記録する" },
    { rule = "rules/readable_code/03_comments.md:コメントで関数の入出力例を示す" },
    { rule = "rules/readable_code/03_comments.md:ファイルやクラスに全体像のコメントを付ける" },
    { rule = "rules/readable_code/05_control_flow.md:三項演算子は単純な場合にのみ使う" },
    { rule = "rules/readable_code/05_control_flow.md:if/else ブロックは単純な条件を先に書く" },
    { rule = "rules/readable_code/06_expressions.md:短絡評価の悪用を避ける" },
    { rule = "rules/readable_code/07_variables.md:変数は一度だけ書き込む" },
    { rule = "rules/readable_code/02_naming.md:包含的範囲には first と last を使う" },
    { rule = "rules/readable_code/10_testing.md:エラー メッセージは詳細で役に立つものにする" },
    { rule = "rules/readable_code/10_testing.md:テスト関数は簡潔で意図が明確であるべき" },
]

