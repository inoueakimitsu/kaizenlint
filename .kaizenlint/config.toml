"src/kaizenlint/__init__.py" = [
    { rule = "rules/readable_code/03_comments.md:コメントで関数の入出力例を示す", messages = [
        "re-export 専用の __init__.py であり、関数の実装は含みません。",
    ]},
    { rule = "rules/readable_code/03_comments.md:ファイルやクラスに全体像のコメントを付ける", messages = [
        "__all__ のリストが全体像を示しています。",
    ]},
    { rule = "rules/readable_code/03_comments.md:設計上の判断を記録する", messages = [
        "re-export 専用のモジュールであり、設計判断を記録するほどの複雑さはありません。",
    ]},
    { rule = "rules/readable_code/03_comments.md:コメントで実装の意図 (WHY) を記述する", messages = [
        "パッケージの公開 API を定義する __init__.py であり、WHY は自明です。",
    ]},
    { rule = "rules/readable_code/04_layout.md:宣言をグループにまとめる", messages = [
        "import と __all__ の 2 ブロックのみで構成されており、これ以上のグルーピングは冗長です。",
    ]},
    { rule = "rules/readable_code/02_naming.md:抽象的な名前よりも具体的な名前を使う", messages = [
        "__all__ は Python の標準的なモジュール公開 API 定義です。",
    ]},
]

